model:
  sft_ckpt: "checkpoints/sft/best.pt"
  vqvae_ckpt: "checkpoints/vqvae/best.pt"
  t5_model_name: "google/flan-t5-base"
  motion_codebook_size: 512
  motion_token_dim: 256
  scene_feat_dim: 256
  traj_bins: 64
  traj_range: 2.0

grpo:
  K: 8                            # number of samples per input
  beta: 0.01                      # KL penalty coefficient
  eps: 1e-8                       # advantage normalization epsilon
  temperature: 1.0                # sampling temperature
  top_p: 0.9

reward:
  w_goal: 1.0
  w_contact: 0.5
  w_penetration: -1.0
  w_foot: -0.3
  w_smooth: 0.2
  w_plan: 0.3
  goal_threshold: 0.3             # meters
  contact_threshold: 0.1
  penetration_threshold: 0.02

data:
  data_root: "data/lingo"
  train_split: "train"
  max_seq_len: 512
  fps: 30
  window_size: 48

training:
  batch_size: 4
  num_epochs: 20
  lr: 5e-6
  warmup_steps: 100
  grad_clip: 1.0
  log_every: 10
  save_every: 200
  output_dir: "checkpoints/grpo"

wandb:
  project: "brain2body-grpo"
  name: "grpo-run"
